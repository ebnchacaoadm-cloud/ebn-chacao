backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "docentes"
    label: "Rostros del Ayer"
    folder: "content/docentes"
    create: true
    fields:
      - {label: "Nombre", name: "nombre", widget: "string"}
      - {label: "Cargo", name: "cargo", widget: "string"}
      - {label: "Foto", name: "foto", widget: "image"}